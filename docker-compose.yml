version: "3.9"

services:
  # ==========================================
  # PostgreSQL 16
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: societykro-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: societykro
      POSTGRES_USER: societykro
      POSTGRES_PASSWORD: societykro_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U societykro"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis 7
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: societykro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # NATS with JetStream
  # ==========================================
  nats:
    image: nats:2.10-alpine
    container_name: societykro-nats
    restart: unless-stopped
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring
    command: ["--js", "--sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # MinIO (S3 compatible object storage)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: societykro-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # MinIO bucket initialization
  # ==========================================
  minio-init:
    image: minio/mc:latest
    container_name: societykro-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/societykro-dev --ignore-existing;
      mc anonymous set public local/societykro-dev/public;
      echo 'Bucket created successfully';
      "

  # ==========================================
  # pgAdmin (optional database GUI)
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: societykro-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@societykro.in
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  nats_data:
  minio_data:
  pgadmin_data:
