version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/auth/"
    schema: "migrations/"
    gen:
      go:
        package: "authdb"
        out: "../services/auth-service/internal/repository/authdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "jsonb"
            go_type: "json.RawMessage"
            import: "encoding/json"
